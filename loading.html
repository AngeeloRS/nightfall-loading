<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Nightfall Syndicate TTT Server</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        font-family: Arial, sans-serif;
        color: #e0e0e0;
        overflow: hidden;
    }

    /* Hintergrundcontainer */
    .bg-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: -2;
    }

    /* Bild wieder groß wie vorher */
    .background {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.75) blur(1.5px);
        opacity: 0.95;
    }

    /* Linker dunkler Verlauf */
    .left-fade {
        position: absolute;
        top: 0;
        left: 0;
        width: 20%;
        height: 100%;
        background: linear-gradient(to right, #000 70%, transparent);
        z-index: -1;
    }

    /* Rechter dunkler Verlauf */
    .right-fade {
        position: absolute;
        top: 0;
        right: 0;
        width: 20%;
        height: 100%;
        background: linear-gradient(to left, #000 70%, transparent);
        z-index: -1;
    }

    /* Textbereich */
    .center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    h1 {
        font-size: 48px;
        color: #c9a8ff;
        text-shadow: 0 0 25px #8a2be2;
        margin-bottom: 10px;
    }

    h2 {
        font-size: 22px;
        color: #e6e6e6;
        margin-bottom: 40px;
    }

    .loader {
        border: 6px solid #333;
        border-top: 6px solid #c9a8ff;
        border-radius: 50%;
        width: 70px;
        height: 70px;
        animation: spin 1.2s linear infinite;
        margin: 0 auto 20px auto;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* Regeln-Bereich */
    .rules {
        margin-top: 40px;
        font-size: 18px;
        color: #ffffff;
    }

    .rules-title {
        color: #ff4d4d;
        font-size: 26px;
        font-weight: bold;
        text-shadow: 0 0 10px #ff0000;
        margin-bottom: 10px;
    }

    .rules ul {
        list-style: none;
        padding: 0;
    }

    .rules li {
        margin: 8px 0;
        text-shadow: 0 0 6px #000;
    }

    .footer {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        color: #bbbbbb;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="bg-wrapper">
    <img class="background" src="https://raw.githubusercontent.com/AngeeloRS/nightfall-loading/refs/heads/main/background.jpg">
    <div class="left-fade"></div>
    <div class="right-fade"></div>
</div>

<div class="center">
    <h1>Nightfall Syndicate</h1>
    <h2>TTT Server lädt...</h2>

    <div class="loader"></div>

    <div class="rules">
        <div class="rules-title">Regeln</div>
        <ul>
            <li>Kein RDM</li>
            <li>Kein Ghosting</li>
            <li>Kein Cheating</li>
            <li>Respektvoller Umgang</li>
            <li>Folge den Anweisungen der Admins</li>
        </ul>
    </div>
</div>

<div class="footer">
    © Nightfall Syndicate – Stay Vigilant
</div>

</body>
</html>
