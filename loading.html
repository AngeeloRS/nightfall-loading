<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Nightfall Syndicate TTT Server</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: #000;
        font-family: Arial, sans-serif;
        color: #e0e0e0;
        overflow: hidden;
    }

    /* Hintergrundcontainer */
    .bg-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: -3;
    }

    /* Bild groß + Gesicht im Fokus */
    .background {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center; /* Gesicht im Fokus */
        filter: brightness(0.78) blur(1px);
        opacity: 0.95;
        object-position: top center;

    }

    /* Seitenfüllung */
    .side-fill {
        position: fixed;
        top: 0;
        width: 22%;
        height: 100%;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(4px);
        z-index: -1;
    }

    .side-left { left: 0; }
    .side-right { right: 0; }

    /* Textbereich */
    .center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    h1 {
        font-size: 48px;
        color: #c9a8ff;
        text-shadow: 0 0 25px #8a2be2, 0 0 6px #000;
        margin-bottom: 10px;
    }

    h2 {
        font-size: 22px;
        color: #ffffff;
        text-shadow: 0 0 10px #000, 0 0 4px #000;
        margin-bottom: 40px;
    }

    .loader {
        border: 6px solid #333;
        border-top: 6px solid #c9a8ff;
        border-radius: 50%;
        width: 70px;
        height: 70px;
        animation: spin 1.2s linear infinite;
        margin: 0 auto 20px auto;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* Regeln in einer Box */
    .rules-box {
        margin-top: 40px;
        background: rgba(0, 0, 0, 0.6);
        padding: 20px 30px;
        border-radius: 12px;
        display: inline-block;
        backdrop-filter: blur(4px);
        box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }

    .rules-title {
        color: #ff4d4d;
        font-size: 26px;
        font-weight: bold;
        text-shadow: 0 0 12px #ff0000;
        margin-bottom: 10px;
    }

    .rules-box ul {
        list-style: none;
        padding: 0;
        margin: 0;
        text-align: left;
    }

    .rules-box li {
        margin: 8px 0;
        font-size: 17px;
        text-shadow: 0 0 8px #000;
    }

    .footer {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        color: #bbbbbb;
        font-size: 14px;
        text-shadow: 0 0 6px #000;
    }
</style>
</head>
<body>

<div class="bg-wrapper">
    <img class="background" src="https://raw.githubusercontent.com/AngeeloRS/nightfall-loading/refs/heads/main/background.jpg">
</div>

<div class="side-fill side-left"></div>
<div class="side-fill side-right"></div>

<div class="center">
    <h1>Nightfall Syndicate</h1>
    <h2>TTT Server lädt...</h2>

    <div class="loader"></div>

    <div class="rules-box">
        <div class="rules-title">Regeln</div>
        <ul>
            <li>Kein RDM</li>
            <li>Kein Ghosting</li>
            <li>Kein Cheating</li>
            <li>Respektvoller Umgang</li>
            <li>Folge den Anweisungen der Admins</li>
        </ul>
    </div>
</div>

<div class="footer">
    © Nightfall Syndicate – Stay Vigilant
</div>

</body>
</html>
