<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Nightfall Syndicate TTT Server</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: #0b0b0f;
        font-family: Arial, sans-serif;
        color: #e0e0e0;
        overflow: hidden;
    }

    /* Hintergrundbild mit 50% Transparenz */
    .background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: background-image: url('https://raw.githubusercontent.com/angeelors/nightfall-loading/main/background.jpg');
        background-size: cover;
        background-position: center;
        opacity: 0.5; /* 50% transparent */
        z-index: -1;
    }

    .center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
    }

    h1 {
        font-size: 48px;
        color: #8a2be2;
        text-shadow: 0 0 15px #8a2be2;
        margin-bottom: 10px;
    }

    h2 {
        font-size: 22px;
        color: #cccccc;
        margin-bottom: 40px;
    }

    .loader {
        border: 6px solid #333;
        border-top: 6px solid #8a2be2;
        border-radius: 50%;
        width: 70px;
        height: 70px;
        animation: spin 1.2s linear infinite;
        margin: 0 auto 20px auto;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
